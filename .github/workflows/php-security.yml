name: PHP Security & Quality Scan

on: [push, pull_request]

jobs:
  php-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: cs2pr, phpcs, psalm

      - name: Install Dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run PHP CodeSniffer (Code Quality)
        run: phpcs -n --standard=PSR12 --ignore=vendor/,Legacy/ .

      - name: Run Psalm Security/Taint Analysis
        run: vendor/bin/psalm --taint-analysis