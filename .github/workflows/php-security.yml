name: PHP Security & Quality Scan

on: [push, pull_request]

jobs:
  php-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: cs2pr, phpcs, psalm

      - name: Run PHP CodeSniffer (Code Quality)
        run: phpcs -n --standard=PSR12 --ignore=vendor/,Legacy/ .

      - name: Run Psalm Security/Taint Analysis
        run: |
          psalm --init . 
          psalm --taint-analysis